name: Deploy

# Runs on merge to main: apply DB migrations (behind a manual approval gate),
# then deploy the web app to Vercel production.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  migrations:
    name: Supabase migrations (db push)
    runs-on: ubuntu-latest
    # Manual approval gate: configure required reviewers on the "production"
    # environment (repo Settings → Environments → production). The job pauses
    # here until an approver signs off before any migration hits prod.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy:
    name: Vercel production deploy
    runs-on: ubuntu-latest
    # Deploy only after migrations succeed, so new code never serves against an
    # un-migrated schema.
    needs: migrations
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel project settings + env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
