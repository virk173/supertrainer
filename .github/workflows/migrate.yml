name: Migrate (production DB)

# Manual gate: production migrations run ONLY when you trigger this workflow
# from the Actions tab (Run workflow) — nothing hits prod automatically. This
# works on any GitHub plan (unlike environment required-reviewers, which need
# Pro on a private repo). App deploys are handled by Vercel's Git integration.
#
# If you later make the repo public or upgrade to Pro, you can add
# `push: { branches: [main] }` back and enforce an approval via required
# reviewers on the `production` environment.
on:
  workflow_dispatch:

concurrency:
  group: migrate-main
  cancel-in-progress: false

jobs:
  migrations:
    name: Supabase migrations (db push)
    runs-on: ubuntu-latest
    # Scopes the run to the `production` environment (add required reviewers
    # here once your plan supports it, for an extra approval pause).
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
