name: CI

# Gate every PR into main. Runs on the pull_request event only (one run per PR;
# a separate push trigger would double every run). On a public repo or GitHub
# Pro, require the "Typecheck & lint" and "RLS + E2E" checks in branch protection.
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  test:
    name: RLS + E2E (local Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: latest

      # Brings up the local stack in Docker (present on ubuntu-latest) and
      # applies every migration + seed — equivalent to `supabase db reset`.
      - name: Start Supabase
        run: supabase start

      - name: RLS / pgTAP tests
        run: supabase test db

      # The Playwright suite seeds data through the service role, reading
      # apps/web/.env.local. Generate it from the running local stack.
      - name: Write apps/web/.env.local from local Supabase
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            > apps/web/.env.local
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> apps/web/.env.local

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      # playwright.config.ts starts `npm run dev` itself and waits for :3000.
      # ANTHROPIC_API_KEY is intentionally NOT provided here: the AI-dependent
      # e2e tests (interview/preview/style) skip when it's absent, keeping CI
      # deterministic and free of a paid-AI/credit dependency (a red CI because a
      # billing balance dipped is exactly the flakiness we don't want gating
      # merges). The live AI paths are exercised locally, by the eval scripts,
      # and in production.
      - name: Playwright smoke tests
        run: npm run test
        working-directory: apps/web
